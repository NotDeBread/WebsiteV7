<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="404.css">
    <link rel="stylesheet" href="../global.css">
    <link rel="icon" type="image/x-icon" href="../media/favicon.png">
    <title>DeBread's Space - Page not found</title>
</head>
<body>
    <div id="crtOverlay"></div>
    <div id="loadingEmblemContainer">
        <img src="../media/emblem.svg" width="100" id="loadingEmblem">
    </div>
    <div id="loadingScreenContainer">
        <div id="loadingScreen"></div>
    </div>

    <div id="achievementNotiContainer"></div>

    <img src="../media/gauntletofgormlessterror.gif" id="him" onclick="DeBread.playSound('../media/audio/bark.mp3', 0.25)">

    <div id="fourohfour">
      <span>404</span><br>
      <em>Page not found</em>
    </div>

    <div id="infoBox">
      <span>The page </span><span id="unknownpage" style="font-family: 'JetBrains Mono', monospace;">undefined</span><span> links to a page that doesnt exist or has not been made yet.</span>
    </div>

    <button id="returnButton" onclick="gotoPage('home')">Return to main page</button>


    <script src="../DeBread.js"></script>
    <script src="../global.js"></script>
    <script src="404.js"></script>

    <!-- BG Shader -->
    <script src="https://xemantic.github.io/shader-web-background/dist/shader-web-background.min.js"></script>
    <script type="x-shader/x-fragment" id="image">
    precision mediump float;
    #define SPIN_EASE 0.8
    #define spin_time 5.
    #define spin_amount 0.3
    #define contrast 1.

    // #define PIXEL_SIZE_FAC 700.

    // default colours
    #define colour_1 vec4(0.118, 0.098, 0.176 ,1.0)
    #define colour_2 vec4(0.0,0,0.0,1.0)
    #define colour_3 vec4(0,0,0,1.0)

    // dark theme colors
    // #define colour_1 vec4(0.0, 0.0, 0.0, 1.0)
    // #define colour_2 vec4(0.1, 0.1, 0.1, 1.0)
    // #define colour_3 vec4(0.15, 0.15, 0.15, 1.0)

    // light theme colors
    // #define colour_1 vec4(1, 1, 1, 1.0)
    // #define colour_2 vec4(0.9, 0.9, 0.9, 1.0)
    // #define colour_3 vec4(0.8, 0.8, 0.8, 1.0)

    uniform vec2 iResolution;
    uniform float iTime;

    void main( )
    {
      // uncomment to enable pixelated bg
      // float pixel_size = length(iResolution.xy)/PIXEL_SIZE_FAC;
      float pixel_size = 1.0;
      vec2 uv = (floor(gl_FragCoord.xy*(1./pixel_size))*pixel_size - 0.5*iResolution.xy)/length(iResolution.xy) - vec2(0.12, 0.);
      
      float uv_len = length(uv);
      
      float speed = (spin_time*SPIN_EASE*0.2) + 302.2;
      float new_pixel_angle = (atan(uv.y, uv.x)) + speed - SPIN_EASE*20.*(1.*spin_amount*uv_len + (1. - 1.*spin_amount));
      
      vec2 mid = vec2(0.5, 0.5);
      uv = (vec2((uv_len * cos(new_pixel_angle) + mid.x), (uv_len * sin(new_pixel_angle) + mid.y)) - mid);
      
      uv *= 30.;
      speed = iTime*(2.);
      vec2 uv2 = vec2(uv.x+uv.y);

      for(int i=0; i < 5; i++) {
        uv2 += sin(max(uv.x, uv.y)) + uv;
        uv  += 0.5*vec2(cos(5.1123314 + 0.353*uv2.y + speed*0.131121),sin(uv2.x - 0.113*speed));
        uv  -= 1.0*cos(uv.x + uv.y) - 1.0*sin(uv.x*0.711 - uv.y);
      }
      
      float contrast_mod = (0.25*contrast + 0.5*spin_amount + 1.2);
      float paint_res =min(2., max(0.,length(uv)*(0.035)*contrast_mod));
      float c1p = max(0.,1. - contrast_mod*abs(1.-paint_res));
      float c2p = max(0.,1. - contrast_mod*abs(paint_res));
      float c3p = 1. - min(1., c1p + c2p);

      // Output to screen
      gl_FragColor = (0.3/contrast)*colour_1 + (1. - 0.3/contrast)*(colour_1*c1p + colour_2*c2p + vec4(c3p*colour_3.rgb, c3p*colour_1.a));
    }
  </script>
  <script src="../bgShader.js"></script>
</body>
</html>
